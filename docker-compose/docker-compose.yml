version: '3.8'

# --- 1. XARXES CUSTOM (Nivell Avançat) ---
networks:
  frontend_net:
    driver: bridge
  backend_net:
    driver: bridge

# --- 2. VOLUMS PERSISTENTS (Nivell Core) ---
volumes:
  redis_data:
  nginx_logs:

services:
  # SERVEI 1: Nginx (Dona la cara a internet)
  nginx:
    image: nginx:latest
    ports:
      - "${NGINX_PORT}:80"
    networks:
      - frontend_net
    volumes:
      # Muntem la nostra configuració de proxy
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      # Volum persistent per no perdre els logs
      - nginx_logs:/var/log/nginx
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M

  # SERVEI 2: Backend Python (L'aplicació pròpia)
  backend:
    build: ./backend
    networks:
      - frontend_net
      - backend_net
    environment:
      - APP_PORT=${BACKEND_PORT}
      - WELCOME_MESSAGE=${WELCOME_MESSAGE}
    restart: always
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:${BACKEND_PORT}/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    depends_on:
      redis:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  # SERVEI 3: Redis (Base de dades en memòria per justificar volums)
  redis:
    image: redis:alpine
    networks:
      - backend_net
    volumes:
      - redis_data:/data
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
