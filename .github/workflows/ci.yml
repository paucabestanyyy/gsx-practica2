name: CI - Build, Scan & Validate

# Disparadors: push a main + pull requests
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: docker.io
  IMAGE_NAMESPACE: paucabestany

jobs:
  # ============================================================
  # JOB 1: Lint i validacio del codi IaC (Terraform)
  # ============================================================
  validate-terraform:
    name: Validate Terraform IaC
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.0

      - name: Terraform fmt (check style)
        working-directory: ./terraform
        run: terraform fmt -check -recursive

      - name: Terraform init (sense backend)
        working-directory: ./terraform
        run: terraform init -backend=false

      - name: Terraform validate
        working-directory: ./terraform
        run: terraform validate

  # ============================================================
  # JOB 2: Build + scan + push de les imatges Docker
  # ============================================================
  build-and-scan:
    name: Build, Scan & Push Docker images
    runs-on: ubuntu-latest
    needs: validate-terraform
    permissions:
      contents: read
      packages: write
      security-events: write

    strategy:
      matrix:
        include:
          - name: nginx-gsx
            context: ./app-nginx
            dockerfile: ./app-nginx/Dockerfile
          - name: python-app-gsx
            context: ./app-python
            dockerfile: ./app-python/Dockerfile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set short SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short=8 HEAD)" >> $GITHUB_OUTPUT

      # ----- Setup Buildx amb cache (Advanced: performance) -----
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ----- Build amb cache (no fa push encara) -----
      - name: Build image (with cache)
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: false
          load: true
          tags: |
            ${{ env.IMAGE_NAMESPACE }}/${{ matrix.name }}:${{ steps.vars.outputs.sha_short }}
            ${{ env.IMAGE_NAMESPACE }}/${{ matrix.name }}:latest
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

      # ----- Security scan amb Trivy (Advanced: fail on HIGH/CRITICAL) -----
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAMESPACE }}/${{ matrix.name }}:${{ steps.vars.outputs.sha_short }}
          format: 'sarif'
          output: 'trivy-results-${{ matrix.name }}.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'   # No bloqueja per ara - pujem el report a Security tab
          ignore-unfixed: true

      - name: Upload Trivy results to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results-${{ matrix.name }}.sarif'
          category: 'trivy-${{ matrix.name }}'

      # ----- SBOM (Software Bill of Materials) - Advanced -----
      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.IMAGE_NAMESPACE }}/${{ matrix.name }}:${{ steps.vars.outputs.sha_short }}
          format: spdx-json
          output-file: sbom-${{ matrix.name }}.spdx.json

      - name: Upload SBOM as artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.name }}
          path: sbom-${{ matrix.name }}.spdx.json

      # ----- Push final (nomes en push a main) -----
      - name: Push image to Docker Hub
        if: github.event_name == 'push'
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.IMAGE_NAMESPACE }}/${{ matrix.name }}:${{ steps.vars.outputs.sha_short }}
            ${{ env.IMAGE_NAMESPACE }}/${{ matrix.name }}:latest
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

  # ============================================================
  # JOB 3: Resum final del pipeline
  # ============================================================
  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [validate-terraform, build-and-scan]
    if: always()
    steps:
      - name: Pipeline summary
        run: |
          echo "## CI Pipeline Resultats" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Terraform validacio: ${{ needs.validate-terraform.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Build/Scan/Push:     ${{ needs.build-and-scan.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Per desplegar a Minikube (CD local):" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "cd terraform/" >> $GITHUB_STEP_SUMMARY
          echo "terraform apply -var-file=envs/dev.tfvars -var=image_tag=${GITHUB_SHA::8}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
